name: CI
# Full WinterCMS installation, fixture schema restore, generator run, then curl smoke tests.
# Only on Ubuntu — acorn-setup-new-winter is Ubuntu-specific.

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:

  # ── Quick syntax check (no WinterCMS needed) ─────────────────────────────────

  lint:
    name: PHP Syntax ${{ matrix.php }}
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        php: [ "8.1", "8.2" ]

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}

      - name: Check PHP syntax
        run: find acorn-create-system-classes -name "*.php" -exec php -l {} \;

      - name: Install Composer dependencies
        run: composer install --no-interaction --no-progress

      - name: Dry run — show usage (no DB required)
        run: php acorn-create-system 2>&1 | head -1

  # ── Integration test: full install → generate → migrate → smoke test ─────────

  integrate:
    name: Integration
    runs-on: ubuntu-22.04

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: wintercms
          POSTGRES_USER: createsystem
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
        with:
          path: create-system

      - name: Setup PHP 8.1
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: pdo_pgsql, mbstring, xml, gd, curl, zip
          coverage: none

      - name: Check out setup scripts
        uses: actions/checkout@v4
        with:
          repository: anewholm/scripts
          path: scripts-repo

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-create-system-wintercms-1.2.0
          restore-keys: composer-create-system-

      # Step 1 — Install WinterCMS + Acorn ─────────────────────────────────────
      - name: Install WinterCMS + Acorn
        run: |
          bash scripts-repo/acorn-setup-new-winter \
            --winter-version=1.2.0 \
            --admin-password=testpassword123 \
            --db-username=createsystem \
            --db-password=testpassword \
            --db-host=127.0.0.1 \
            --acorn-github=anewholm/acorn \
            --no-interactive \
            --no-dbauth \
            --apply-l10-fix \
            --no-apache \
            --install-dir=${{ github.workspace }} \
            wintercms

      # Step 2 — Restore test database (fixture schema) ────────────────────────
      - name: Restore test database
        run: |
          PGPASSWORD=testpassword psql -h 127.0.0.1 -U createsystem -d wintercms \
            -f ${{ github.workspace }}/create-system/tests/fixture_schema.sql

      # Step 3 — Run acorn-create-system ───────────────────────────────────────
      - name: Install create-system Composer dependencies
        working-directory: create-system
        run: composer install --no-interaction --no-progress

      - name: Run acorn-create-system against test fixture
        working-directory: ${{ github.workspace }}/wintercms
        run: php ${{ github.workspace }}/create-system/acorn-create-system test

      - name: Check generated PHP files are syntactically valid
        working-directory: ${{ github.workspace }}/wintercms
        run: find plugins/acorn/test -name "*.php" -exec php -l {} \;

      - name: Show generated file list
        working-directory: ${{ github.workspace }}/wintercms
        run: find plugins/acorn/test -type f | sort

      # Register generated plugin in WinterCMS (tables already exist from fixture restore above)
      - name: Register generated plugin (winter:up)
        working-directory: ${{ github.workspace }}/wintercms
        run: php artisan winter:up

      - name: Verify plugin registered in database
        run: |
          PGPASSWORD=testpassword psql -h 127.0.0.1 -U createsystem -d wintercms \
            -c "SELECT code, version, is_disabled FROM system_plugin_versions WHERE code LIKE '%test%';"

      - name: Enable APP_DEBUG for smoke tests
        working-directory: ${{ github.workspace }}/wintercms
        run: sed -i 's/^APP_DEBUG=.*/APP_DEBUG=true/' .env

      # Step 4 — Smoke tests against the generated plugin ──────────────────────
      - name: Configure PHP error logging
        run: printf '[PHP]\nerror_log=/tmp/php-errors.log\nlog_errors=1\ndisplay_errors=On\nerror_reporting=32767\nmemory_limit=256M\npcre.jit=0\n' > /tmp/ci-php.ini

      - name: Start PHP server
        working-directory: ${{ github.workspace }}/wintercms
        env:
          PHP_INI_SCAN_DIR: "/tmp:"
          PHP_CLI_SERVER_WORKERS: 4
        run: nohup php artisan serve --port=8000 > /tmp/php-server.log 2>&1 &

      - name: Wait for server
        run: |
          for i in $(seq 1 20); do
            curl -sfL http://localhost:8000/backend/backend/auth/signin -o /dev/null && break
            sleep 2
          done

      - name: Login and obtain session cookie
        run: |
          BODY=$(curl -s -L -c /tmp/cookies.txt http://localhost:8000/backend/backend/auth/signin)
          TOKEN=$(echo "$BODY" | grep -o 'name="csrf-token" content="[^"]*"' | sed 's/.*content="\([^"]*\)"/\1/' | head -1)
          echo "CSRF token extracted: ${TOKEN:0:10}..."
          test -n "$TOKEN"

          RESPONSE=$(curl -s -L \
            -c /tmp/cookies.txt -b /tmp/cookies.txt \
            --data-urlencode "_token=$TOKEN" \
            -d "postback=1&login=admin&password=testpassword123" \
            http://localhost:8000/backend/backend/auth/signin)

          if echo "$RESPONSE" | grep -qi 'class="outer signin"'; then
            echo "Login FAILED — still on signin page:"
            echo "$RESPONSE" | head -40
            exit 1
          fi
          echo "Login: OK"

      - name: Generated categories list loads
        run: |
          RESPONSE=$(curl -s -L -w "\nHTTP_STATUS:%{http_code}" \
            -b /tmp/cookies.txt -c /tmp/cookies.txt \
            http://localhost:8000/backend/acorn/test/categories)
          STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS:" | sed 's/.*HTTP_STATUS://')
          echo "Categories list status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "=== Response body (first 80 lines) ==="
            echo "$RESPONSE" | grep -v "HTTP_STATUS:" | head -80
          fi
          test "$STATUS" = "200"

      - name: Generated events list loads
        run: |
          RESPONSE=$(curl -s -L -w "\nHTTP_STATUS:%{http_code}" \
            -b /tmp/cookies.txt -c /tmp/cookies.txt \
            http://localhost:8000/backend/acorn/test/events)
          STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS:" | sed 's/.*HTTP_STATUS://')
          echo "Events list status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "=== Response body (first 80 lines) ==="
            echo "$RESPONSE" | grep -v "HTTP_STATUS:" | head -80
          fi
          test "$STATUS" = "200"

      - name: Generated categories create form loads
        run: |
          RESPONSE=$(curl -s -L --retry 3 --retry-delay 5 --retry-all-errors \
            -w "\nHTTP_STATUS:%{http_code}" \
            -b /tmp/cookies.txt -c /tmp/cookies.txt \
            http://localhost:8000/backend/acorn/test/categories/create)
          STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS:" | sed 's/.*HTTP_STATUS://')
          echo "Categories create form status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "=== Response body (first 60 lines) ==="
            echo "$RESPONSE" | grep -v "HTTP_STATUS:" | head -60
          fi
          test "$STATUS" = "200"

      - name: Create a category via AJAX
        run: |
          BODY=$(curl -s -b /tmp/cookies.txt http://localhost:8000/backend/acorn/test/categories/create)
          TOKEN=$(echo "$BODY" | grep -o 'name="csrf-token" content="[^"]*"' | sed 's/.*content="\([^"]*\)"/\1/' | head -1)
          test -n "$TOKEN"

          STATUS=$(curl -s -w "%{http_code}" -o /dev/null \
            -b /tmp/cookies.txt -c /tmp/cookies.txt \
            -H "X-WINTER-REQUEST-HANDLER: onSave" \
            -H "X-WINTER-REQUEST-PARTIALS: " \
            -H "X-Requested-With: XMLHttpRequest" \
            -F "_token=$TOKEN" \
            -F "Category[name]=CI Test Category" \
            http://localhost:8000/backend/acorn/test/categories/create)
          echo "Create category status: $STATUS"
          test "$STATUS" = "200" -o "$STATUS" = "302"

      - name: Verify category appears in database
        run: |
          COUNT=$(PGPASSWORD=testpassword psql -h 127.0.0.1 -U createsystem -d wintercms \
            -t -c "SELECT count(*) FROM acorn_test_categories WHERE name='CI Test Category';" | tr -d ' ')
          echo "Category records in DB: $COUNT"
          test "$COUNT" -ge "1"

      - name: Generated events create form loads
        run: |
          STATUS=$(curl -s -L --retry 3 --retry-delay 5 --retry-all-errors \
            -o /dev/null -w "%{http_code}" \
            -b /tmp/cookies.txt -c /tmp/cookies.txt \
            http://localhost:8000/backend/acorn/test/events/create)
          echo "Events create form status: $STATUS"
          test "$STATUS" = "200"

      - name: Dump PHP server log on failure
        if: failure()
        run: cat /tmp/php-server.log

      - name: Dump PHP error log on failure
        if: failure()
        run: cat /tmp/php-errors.log || echo "(no PHP error log)"

      - name: Dump WinterCMS log on failure
        if: failure()
        working-directory: ${{ github.workspace }}/wintercms
        run: find storage/logs -name "*.log" -exec cat {} \;
